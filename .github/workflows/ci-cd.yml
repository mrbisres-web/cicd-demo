name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: cicd-demo

jobs:
  # ─── JOB 1: Lint ────────────────────────────────────────────
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run flake8
        run: flake8 src/ tests/

  # ─── JOB 2: Test ────────────────────────────────────────────
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-fail-under=80

  # ─── JOB 3: Build Docker image ──────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t $IMAGE_NAME:${{ github.sha }} .

      - name: Smoke test container
        run: |
          docker run -d --name demo -p 5000:5000 $IMAGE_NAME:${{ github.sha }}
          sleep 3
          curl --fail http://localhost:5000/health
          docker stop demo

  # ─── JOB 4: Deploy to Render ────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy
        run: |
          curl --fail "${{ secrets.RENDER_DEPLOY_HOOK }}"

      - name: Wait for deploy
        run: sleep 30

      - name: Health check
        run: |
          curl --fail --retry 5 --retry-delay 10 \
            https://cicd-demo-svej.onrender.com/health

